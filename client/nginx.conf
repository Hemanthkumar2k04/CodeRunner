server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Static assets: long-lived cache (Vite hashed filenames) ───────
    location ~* \.(js|css|webp|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend proxy settings ────────────────────────────────────────
    # Docker embedded DNS — prevents nginx crash if backend restarts
    resolver 127.0.0.11 valid=30s;
    set $backend "http://backend:3000";

    # Shared proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Proxy timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── API routes ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass $backend;
    }

    location /execute {
        proxy_pass $backend;
    }

    # ── Admin ─────────────────────────────────────────────────────────
    # Serve React SPA for the /admin page (React Router renders the UI)
    location = /admin {
        try_files /index.html =404;
    }

    # Proxy admin API sub-routes to the backend
    location /admin/ {
        proxy_pass $backend;
    }

    # ── WebSocket ─────────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }
}
