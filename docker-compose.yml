services:
  backend:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: coderunner-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_KEY=${ADMIN_KEY:-development_key}
    volumes:
      # Mount the Docker socket so the backend can spawn execution containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the runtimes directory so the backend can build language images on startup
      - ./runtimes:/app/server/runtimes
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: client.Dockerfile
    container_name: coderunner-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
